<div class="flex align-center justify-between" style="width: 100%;">

  <label for="menu-control">
    <img src="{{ partial "docs/icon" "menu" }}" class="book-icon" alt="{{ partial "docs/text/i18n" "Menu" }}" />
  </label>

  <h3>{{ partial "docs/title" . }}</h3>

  <div class="flex align-center" style="gap: 12px;">
    <button id="toggle-btn-mobile" class="interlinear-btn interlinear-btn-mobile">切換顯示模式</button>

    <label for="toc-control">
      {{ if partial "docs/toc-show" . }}
      <img src="{{ partial "docs/icon" "toc" }}" class="book-icon" alt="{{ partial "docs/text/i18n" "Table of Contents" }}" style="margin-bottom: 0; vertical-align: middle;" />
      {{ end }}
    </label>
  </div>
