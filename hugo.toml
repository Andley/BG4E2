baseURL = 'https://andley.github.io/GG/'
locale = 'zh-tw'
title = '全民希臘文 BG4E'
theme = 'hugo-book'


[params]
  # 預設是 "docs"，改為 "*" 代表直接讀取 content 根目錄下的所有 Markdown
  BookSection = "*"
  # 將選單模式設定為 filetree (預設為此模式，但建議顯式指定)
  BookMenuBundle = false
  
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 🔥 關鍵設定：允許在 Markdown 中直接使用原生 HTML
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.link]
        useEmbedded = "always"