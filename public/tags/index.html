<script>
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('toggle-btn');
  if (!btn) return;

  const topLevelRubies = Array.from(document.querySelectorAll('ruby')).filter(ruby => {
    return !ruby.parentElement.closest('ruby');
  });

  if (topLevelRubies.length === 0) {
    btn.style.display = 'none';
    return;
  }

  topLevelRubies.forEach(ruby => {
    try {
      const rts = Array.from(ruby.querySelectorAll('rt'));
      if (rts.length >= 3) {
        const meaning = rts[0].textContent.trim();
        const lemma = rts[1].textContent.trim();
        const pos = rts[2].textContent.trim();
        ruby.setAttribute('data-hover', `${lemma} [${pos}]\n${meaning}`);
      }
    } catch (e) {}
  });

  btn.addEventListener('click', () => {
    const isOneLine = document.body.classList.toggle('one-line-mode');
    btn.textContent = isOneLine ? "切換為：四行對齊模式" : "切換為：一行模式";
    
    topLevelRubies.forEach(ruby => {
      const innerRuby = ruby.querySelector('ruby > ruby') || ruby;
      const targetElement = innerRuby.querySelector('a') || innerRuby;
      const hoverData = ruby.getAttribute('data-hover');
      
      if (isOneLine && hoverData) {
        targetElement.setAttribute('title', hoverData);
      } else {
        targetElement.removeAttribute('title');
      }
    });
  });
});
</script>
